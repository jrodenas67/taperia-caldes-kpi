  .login-error { color: #e53e3e; font-size: 13px; margin-top: 10px; display: none; }

  .tab-bar {

    position: sticky; top: 0; z-index: 10;
  }
  .tab-bar label {
    flex: 1; text-align: center; padding: 12px 4px; font-size: 13px;

  .tab-content { display: none; padding: 14px; }

  #t2:checked ~ .tab-content.c2,
  #t3:checked ~ .tab-content.c3 { display: block; }
  .section { background: #fff; border-radius: 14px; border: 1px solid #ddd; overflow: hidden; }
  label.item {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    border-bottom: 1px solid #f0f0ea; cursor: pointer; min-height: 52px;

  input[type="checkbox"] {

    width: 26px; height: 26px; min-width: 26px; border-radius: 8px;
    border: 2px solid #ccc; background: #fff; cursor: pointer;

  input[type="checkbox"]:checked::after {

    width: 12px; height: 7px;
    border-left: 2.5px solid #fff; border-bottom: 2.5px solid #fff;

  .item-label { font-size: 15px; line-height: 1.45; flex: 1; }

  .nota { font-size: 12px; color: #bbb; text-align: center; padding: 16px 0 8px; }

  "mastertaperiadecaldes@yurest.com"
]);
const CORRECT_HASH = "75cfb41bb1cb34d51ba6b8e9f2e5084e5c39c6dc0b065c18755fcdbced884656";

async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function showApp() {
  document.getElementById("login-overlay").classList.add("hidden");
}

async function doLogin() {
  const email = document.getElementById("email-input").value.trim().toLowerCase();
  const pass  = document.getElementById("pass-input").value;
  const hash  = await sha256(pass);
  if (ALLOWED_EMAILS.has(email) && hash === CORRECT_HASH) {
    sessionStorage.setItem("taperia_auth", "1");
    showApp();
  } else {
    const err = document.getElementById("login-error");
    err.style.display = "block";
    setTimeout(() => { err.style.display = "none"; }, 3000);
  }
}

document.getElementById("pass-input").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

if (sessionStorage.getItem("taperia_auth") === "1") showApp();
</script>
