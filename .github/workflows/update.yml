name: Actualizar Arqueo + Panel KPI Taperia

on:
  schedule:
    # 04:00 UTC = 06:00 hora de Madrid (verano/CEST).
    # En invierno (CET) equivale a las 05:00 locales: los datos quedan listos
    # antes de las 6:00 igualmente.
    - cron: '0 4 * * *'
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pypdf --quiet

      - name: Regenerar JSONs desde Gmail (cierres + referencia 2025)
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python generar_arqueo.py

      - name: Actualizar panel KPI (mes en curso) desde el histórico
        run: python update_kpi.py

      - name: Commit cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ultimo_cierre.json historico_caja.json cierres_diarios.json ref_meses.json kpi_taperia.html
          git diff --cached --quiet || git commit -m "auto: actualizar arqueo + KPI $(date +'%d/%m/%Y %H:%M')"
          git push || true

      - name: Deploy a Netlify (token; sin integración nativa con GitHub)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod \
            --auth    "$NETLIFY_AUTH_TOKEN" \
            --site    "$NETLIFY_SITE_ID"   \
            --dir     .                    \
            --message "Auto-update $(date +'%d/%m/%Y %H:%M')"
